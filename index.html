<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ta-Te-Ti vs CPU</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TaTeTi">

<link rel="apple-touch-icon" href="icon-192.png">

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #fff;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    box-sizing: border-box;
  }

  h1 {
    margin: 10px 0;
    font-size: clamp(22px, 5vw, 34px);
    text-align: center;
  }

  #status {
    margin: 15px;
    font-size: clamp(16px, 4vw, 20px);
    text-align: center;
    min-height: 24px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, minmax(70px, 18vmin));
    grid-template-rows: repeat(3, minmax(70px, 18vmin));
    gap: 2vmin;
  }

  .cell {
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(28px, 10vmin, 48px);
    cursor: pointer;
    border-radius: 10px;
    user-select: none;
    transition: 0.2s;
  }

  .cell:hover {
    background: #333;
  }

  button {
    margin-top: 20px;
    padding: 12px 18px;
    background: #00c2ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
    font-size: clamp(14px, 3.5vw, 16px);
  }

  button:hover {
    background: #00a0d1;
  }
</style>
</head>

<body>

<h1>Ta-Te-Ti vs CPU</h1>

<div id="status">Tu turno: X</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Reiniciar</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let human = "X";
let ai = "O";
let currentPlayer = human;

let gameState = Array(9).fill("");
let gameActive = true;

const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard() {
  board.innerHTML = "";

  gameState.forEach((_, i) => {
    const cell = document.createElement("div");

    cell.className = "cell";
    cell.dataset.i = i;

    cell.addEventListener("click", playerMove);

    board.appendChild(cell);
  });
}

function playerMove(e) {
  const i = e.target.dataset.i;

  if (!gameActive || gameState[i] !== "" || currentPlayer !== human) {
    return;
  }

  makeMove(i, human);

  if (gameActive) {
    currentPlayer = ai;

    statusText.textContent = "Turno CPU...";

    setTimeout(aiMove, 350);
  }
}

function makeMove(i, player) {
  gameState[i] = player;

  document.querySelectorAll(".cell")[i].textContent = player;

  if (checkWin(player)) {
    statusText.textContent =
      player === human
        ? "Ganaste 🎉"
        : "Gana CPU 🤖";

    gameActive = false;

    return;
  }

  if (!gameState.includes("")) {
    statusText.textContent = "Empate 🤝";

    gameActive = false;

    return;
  }

  statusText.textContent =
    player === human
      ? "Tu turno: X"
      : "Turno CPU...";
}

function aiMove() {
  if (!gameActive) return;

  let move = findBestMove(ai);

  if (move === null) {
    move = findBestMove(human);
  }

  if (move === null) {
    const empty = gameState
      .map((v, i) => v === "" ? i : null)
      .filter(v => v !== null);

    move = empty[Math.floor(Math.random() * empty.length)];
  }

  makeMove(move, ai);

  currentPlayer = human;

  if (gameActive) {
    statusText.textContent = "Tu turno: X";
  }
}

function findBestMove(player) {
  for (let i = 0; i < 9; i++) {
    if (gameState[i] === "") {

      gameState[i] = player;

      let win = checkWin(player);

      gameState[i] = "";

      if (win) return i;
    }
  }

  return null;
}

function checkWin(player) {
  return wins.some(combo =>
    combo.every(i => gameState[i] === player)
  );
}

function resetGame() {
  gameState = Array(9).fill("");

  currentPlayer = human;

  gameActive = true;

  statusText.textContent = "Tu turno: X";

  createBoard();
}

createBoard();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {

    navigator.serviceWorker
      .register("./service-worker.js")

      .then(() => {
        console.log("Service Worker registrado");
      })

      .catch(err => {
        console.log("Error registrando SW:", err);
      });

  });
}
</script>

</body>
</html>
