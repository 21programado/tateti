<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ta-Te-Ti vs CPU</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #111;
    color: #fff;
    margin-top: 40px;
  }

  h1 { margin-bottom: 10px; }

  #status {
    margin: 15px;
    font-size: 18px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 8px;
  }

  .cell {
    width: 100px;
    height: 100px;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    cursor: pointer;
  }

  .cell:hover { background: #333; }

  button {
    margin-top: 20px;
    padding: 10px;
    background: #00c2ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Ta-Te-Ti vs CPU</h1>
<div id="status">Tu turno: X</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Reiniciar</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let human = "X";
let ai = "O";
let currentPlayer = human;

let gameState = Array(9).fill("");
let gameActive = true;

const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard() {
  board.innerHTML = "";
  gameState.forEach((_, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.i = i;
    cell.addEventListener("click", playerMove);
    board.appendChild(cell);
  });
}

function playerMove(e) {
  const i = e.target.dataset.i;

  if (!gameActive || gameState[i] !== "" || currentPlayer !== human) return;

  makeMove(i, human);

  if (gameActive) {
    currentPlayer = ai;
    statusText.textContent = "Turno CPU...";
    setTimeout(aiMove, 400);
  }
}

function makeMove(i, player) {
  gameState[i] = player;
  document.querySelectorAll(".cell")[i].textContent = player;

  if (checkWin(player)) {
    statusText.textContent = (player === human ? "Ganaste 🎉" : "Gana CPU 🤖");
    gameActive = false;
    return;
  }

  if (!gameState.includes("")) {
    statusText.textContent = "Empate 🤝";
    gameActive = false;
    return;
  }

  statusText.textContent = player === human ? "Turno CPU..." : "Tu turno: X";
}

function aiMove() {
  if (!gameActive) return;

  // 1. intentar ganar
  let move = findBestMove(ai);

  // 2. bloquear al jugador
  if (move === null) move = findBestMove(human);

  // 3. aleatorio
  if (move === null) {
    const empty = gameState.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    move = empty[Math.floor(Math.random()*empty.length)];
  }

  makeMove(move, ai);
  currentPlayer = human;
}

function findBestMove(player) {
  for (let i = 0; i < 9; i++) {
    if (gameState[i] === "") {
      gameState[i] = player;
      let win = checkWin(player);
      gameState[i] = "";
      if (win) return i;
    }
  }
  return null;
}

function checkWin(player) {
  return wins.some(c =>
    c.every(i => gameState[i] === player)
  );
}

function resetGame() {
  gameState = Array(9).fill("");
  currentPlayer = human;
  gameActive = true;
  statusText.textContent = "Tu turno: X";
  createBoard();
}

createBoard();
</script>

</body>
</html>
